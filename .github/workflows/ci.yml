name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run typecheck
      - run: npm --prefix frontend run lint
      - run: npm --prefix frontend run build

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t watchagent:ci .

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write hermetic .env (poller off, no network at boot)
        run: |
          cat > .env <<'EOF'
          LOG_LEVEL=INFO
          DATABASE_URL=sqlite:///./data/watchagent.db
          ENABLE_POLLER=false
          HOST_PORT=8000
          EOF
      - name: Boot container and wait until healthy
        run: docker compose up -d --build --wait --wait-timeout 180
      - name: Assert GET /health returns 200 with the expected shape
        run: |
          code=$(curl -s -o health.json -w '%{http_code}' http://localhost:8000/health)
          echo "HTTP $code"; cat health.json; echo
          test "$code" = "200"
          jq -e '
            .status == "ok"
            and (.readings_stored | type) == "number"
            and (.readings_stored | floor) == .readings_stored
            and (.events_stored | type) == "number"
            and (.events_stored | floor) == .events_stored
          ' health.json
      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v
